[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  VITE_BASE_PATH = "/"
  NODE_VERSION = "18"

[[redirects]]
  from = "/api/*"
  to = "https://tu-backend-url.railway.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[context.production]
  [context.production.environment]
    VITE_API_URL = "https://tu-backend-url.railway.app"
