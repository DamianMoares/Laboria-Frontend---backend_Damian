services:
  - type: web
    name: laboria-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install --include=dev && (npx prisma migrate resolve --rolled-back 20260517214627_change_user_role_to_enum 2>/dev/null || true) && npx prisma generate && npx prisma migrate deploy
    startCommand: cd backend && node server.js
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: laboria-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: CORS_ORIGINS
        value: https://laboria-frontend-backend-damian.vercel.app,*.vercel.app
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://laboria-frontend-backend-damian.vercel.app
      - key: PORT
        value: 10000

databases:
  - name: laboria-db
    plan: free
    databaseName: laboria
