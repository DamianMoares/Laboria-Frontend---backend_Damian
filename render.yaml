services:
  - type: web
    name: laboria-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && node server.js
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: laboria-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGINS
        value: https://laboria-frontend-backend-damian.vercel.app,*.vercel.app
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

databases:
  - name: laboria-db
    plan: free
    databaseName: laboria
    ipAllowList:
      - 74.220.48.0/24
      - 74.220.56.0/24
