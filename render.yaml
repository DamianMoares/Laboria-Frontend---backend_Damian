services:
  - type: web
    name: laboria-backend
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: node server.js
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: laboria-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGINS
        value: https://laboria-frontend.vercel.app,https://laboria-frontend-backend-damian.vercel.app
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

databases:
  - name: laboria-db
    plan: free
    databaseName: laboria
    ipAllowList: []
